<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>MPP Testing Tool</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif; background: #0f172a; color: #f1f5f9; }
    .gradient-bg { background: linear-gradient(135deg, #667eea 0%, #764ba2 100%); }
    .card { background: #1e293b; border: 1px solid #334155; border-radius: 12px; padding: 24px; }
    .btn-primary { background: #667eea; color: white; padding: 10px 20px; border-radius: 6px; cursor: pointer; font-weight: 600; border: none; transition: 0.2s; }
    .btn-primary:hover { background: #764ba2; }
    .test-row { background: #0f172a; border: 1px solid #334155; border-radius: 8px; padding: 16px; margin: 8px 0; }
    .status-completed { color: #10b981; font-weight: bold; }
    .status-pending { color: #f59e0b; }
  </style>
</head>
<body>
  <div class="min-h-screen p-8">
    <!-- Header -->
    <div class="gradient-bg rounded-lg p-8 mb-8">
      <h1 class="text-4xl font-bold mb-2">🏦 MPP Testing Tool</h1>
      <p class="text-gray-200">Free sandbox for testing Machine Payments Protocol integrations</p>
    </div>

    <!-- Stats -->
    <div class="grid grid-cols-3 gap-4 mb-8">
      <div class="card">
        <div class="text-sm text-gray-400 mb-2">Total Tests</div>
        <div class="text-3xl font-bold" id="total-tests">0</div>
      </div>
      <div class="card">
        <div class="text-sm text-gray-400 mb-2">Completed</div>
        <div class="text-3xl font-bold text-green-400" id="completed-tests">0</div>
      </div>
      <div class="card">
        <div class="text-sm text-gray-400 mb-2">Success Rate</div>
        <div class="text-3xl font-bold text-blue-400" id="success-rate">0%</div>
      </div>
    </div>

    <!-- Create Test -->
    <div class="card mb-8">
      <h2 class="text-xl font-bold mb-4">➕ Create New Test</h2>
      <div class="flex gap-4">
        <input 
          type="text" 
          id="test-name"
          placeholder="Test name..."
          value="My MPP Payment Test"
          class="flex-1 px-4 py-2 bg-gray-800 border border-gray-600 rounded text-white"
        />
        <button 
          onclick="runTest()"
          class="btn-primary"
        >
          ▶ Run Test
        </button>
      </div>
    </div>

    <!-- Tests List -->
    <div class="card">
      <h2 class="text-xl font-bold mb-4">📋 Tests</h2>
      <div id="tests-list">
        <p class="text-gray-400">Loading tests...</p>
      </div>
    </div>
  </div>

  <script>
    const API_BASE = 'http://localhost:3001';

    async function loadData() {
      try {
        // Load tests
        const testsRes = await fetch(`${API_BASE}/api/tests`);
        const tests = await testsRes.json();
        
        // Load stats
        const statsRes = await fetch(`${API_BASE}/api/stats`);
        const stats = await statsRes.json();

        // Update stats
        document.getElementById('total-tests').textContent = stats.total_tests || 0;
        document.getElementById('completed-tests').textContent = stats.completed || 0;
        document.getElementById('success-rate').textContent = (stats.success_rate || 0).toFixed(1) + '%';

        // Update tests list
        const testsList = document.getElementById('tests-list');
        if (tests.length === 0) {
          testsList.innerHTML = '<p class="text-gray-400">No tests yet. Create one above!</p>';
        } else {
          testsList.innerHTML = tests.map(test => `
            <div class="test-row">
              <div class="flex justify-between items-start mb-2">
                <div>
                  <div class="font-bold">${test.name}</div>
                  <div class="text-xs text-gray-500 mt-1">ID: ${test.id.substring(0, 12)}...</div>
                </div>
                <div class="status-${test.status}">
                  ${test.status.toUpperCase()}
                </div>
              </div>
              ${test.result ? `
                <div class="mt-3 pt-3 border-t border-gray-700">
                  <div class="text-sm text-gray-400">
                    Result: ${JSON.parse(test.result).success ? '✅ Success' : '❌ Failed'} 
                    (${JSON.parse(test.result).processing_time_ms}ms)
                  </div>
                </div>
              ` : ''}
            </div>
          `).join('');
        }
      } catch (e) {
        console.error('Error:', e);
      }
    }

    async function runTest() {
      const testName = document.getElementById('test-name').value || 'Test';
      
      try {
        // Create test
        const createRes = await fetch(`${API_BASE}/api/tests`, {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ name: testName })
        });
        const test = await createRes.json();

        // Get challenge
        const challengeRes = await fetch(`${API_BASE}/api/challenge`, {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ testId: test.id })
        });
        const challenge = await challengeRes.json();

        // Create credential
        const credential = {
          id: Math.random().toString(36).substring(2, 15),
          signature: '0x' + Math.random().toString(16).substring(2, 130),
          challenge_id: challenge.challenge_id
        };

        // Verify
        await fetch(`${API_BASE}/api/verify-credential`, {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ testId: test.id, credential })
        });

        // Reload
        loadData();
      } catch (e) {
        alert('Error: ' + e.message);
      }
    }

    // Load data immediately and refresh every 2 seconds
    loadData();
    setInterval(loadData, 2000);
  </script>
</body>
</html>
